<!DOCTYPE html>
<html>
  <head>
      <title>My website Created by Ells</title>
      <style>
          
          .datetime-display {
              font-family: Arial, sans-serif;
              font-size: 18px;
              color: #333;
              margin: 20px auto; 
              padding: 10px;
              background-color: rgba(255, 255, 255, 0.6);
              border-radius: 5px;
              display: block; 
              text-align: center; 
              max-width: fit-content; 
          }

          .link-btn {
              display: inline-block;
              font-family: Arial, sans-serif;
              font-size: 16px;
              color: white;
              background-color: #2c3e50;
              text-decoration: none;
              padding: 10px 20px;
              margin: 5px;
              border-radius: 5px;
              transition: background-color 0.2s ease;
          }

          .link-btn:hover {
              background-color: #34495e;
          }
          
          .bg-picker-container {
              position: fixed;
              bottom: 20px;
              left: 20px;
              background-color: white;
              padding: 10px;
              border: 1px solid #ccc;
              border-radius: 8px;
              font-family: Arial, sans-serif;
              box-shadow: 0 4px 6px rgba(0,0,0,0.1);
          }
          
          .bg-picker-container label {
              display: block;
              font-size: 14px;
              font-weight: bold;
              margin-bottom: 5px;
              cursor: pointer;
          }

          /* --- NEW CUSTOM NOTIFICATION STYLES --- */
          /* Dark overlay layer behind the notification box */
          .modal-overlay {
              display: none; /* Hidden by default */
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
              z-index: 1000;
          }

          /* The large box sitting perfectly in the center */
          .custom-alert {
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              background-color: white;
              padding: 30px;
              border-radius: 12px;
              box-shadow: 0 10px 25px rgba(0,0,0,0.2);
              font-family: Arial, sans-serif;
              text-align: center;
              min-width: 320px;
              max-width: 90%;
          }

          /* The text inside the notification */
          .custom-alert h2 {
              margin-top: 0;
              font-size: 26px; /* Made the font larger */
              color: #2c3e50;
          }

          /* The close button inside the box */
          .close-alert-btn {
              margin-top: 20px;
              background-color: #e74c3c;
              color: white;
              border: none;
              padding: 10px 20px;
              font-size: 16px;
              border-radius: 5px;
              cursor: pointer;
          }

          .close-alert-btn:hover {
              background-color: #c0392b;
          }
      </style>
  </head>  
  <body id="myBody" style="background-color: lightblue;">

       <h1 style="color: red; font-family: 'Cambria Math', 'DejaVu Sans', serif; text-align: center;">Welcome to my website</h1>
      
      <div class="datetime-display" id="clock">Loading date and time...</div>

      <p style="font-size: 30px"> Here are some websites you can visit:</p>
      
      <a class="link-btn" href="https://connect.det.wa.edu.au/" target="_blank">Connect</a>
      <a class="link-btn" href="https://chatgpt.com" target="_blank">Chatgpt</a>
      <a class="link-btn" href="https://pcpartpicker.com" target="_blank">PC PartPicker</a>
      <a class="link-btn" href="https://outlook.office.com/mail/" target="_blank">Outlook</a>

      <p style="font-size: 20px; margin-top: 30px;">This is my fav pc build</p>
      <a class="link-btn" style="background-color: #e67e22;" href="https://buildcores.com" target="_blank">My BuildCores PC Build</a>
      
       <p style="font-size: 18px; margin-top: 30px;">Do you like this website?:</p>
       <input type="radio" class="vote-radio" name="team" value="Yes"> Yes
       <input type="radio" class="vote-radio" name="team" value="No"> No <br>

      <!-- NEW INVISIBLE HTML CONTAINER FOR THE NOTIFICATION -->
      <div class="modal-overlay" id="alertModal">
          <div class="custom-alert">
              <!-- You can change this writing directly below -->
              <h2 id="alertMessage">Your text here!</h2>
              <button class="close-alert-btn" onclick="closeNotification()">Close</button>
          </div>
      </div>

      <div class="bg-picker-container">
          <label for="colorPicker">✏️ Edit Background</label>
          <input type="color" id="colorPicker" value="#add8e6">
      </div>

      <script>
          const colorPicker = document.getElementById('colorPicker');
          const body = document.getElementById('myBody');

          colorPicker.addEventListener('input', function() {
              body.style.backgroundColor = colorPicker.value;
          });

          function updateClock() {
              const now = new Date();
              const options = { 
                  weekday: 'long', 
                  year: 'numeric', 
                  month: 'long', 
                  day: 'numeric',
                  hour: '2-digit',
                  minute: '2-digit',
                  second: '2-digit'
              };
              const localDateTime = now.toLocaleDateString(undefined, options);
              document.getElementById('clock').textContent = localDateTime;
          }

          updateClock();
          setInterval(updateClock, 1000);

          
          const radioButtons = document.querySelectorAll('.vote-radio');
          const alertModal = document.getElementById('alertModal');
          const alertMessage = document.getElementById('alertMessage');

          radioButtons.forEach(radio => {
              radio.addEventListener('change', function() {
                 
                  if (this.value === 'Yes') {
                      alertMessage.textContent = "🎉 Glad you love the website! Rate our website at the link bellow";
                  } else if (this.value === 'No') {
                      alertMessage.textContent = "✉️ Thanks for the note! Rate our website at the link bellow!";
                  }
                  
             
                  alertModal.style.display = 'block';
              });
          });

        
          function closeNotification() {
              alertModal.style.display = 'none';
              
             
              radioButtons.forEach(radio => radio.checked = false);
          }
      </script>
 <a class="link-btn" href="https://forms.office.com/r/29vTmDD55B" target="_blank">Rate the Webiste and give feedback!</a><br>

</html>
